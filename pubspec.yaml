name: bubble_therapy
description: AI-Powered Wellness App for Stress Relief

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # AI & ML
  tflite_flutter: ^0.10.4
  tflite_flutter_helper: ^0.3.1
  
  # Audio
  audioplayers: ^5.2.1
  flutter_tts: ^3.8.5
  speech_to_text: ^6.5.1
  
  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  
  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^2.7.0
  fl_chart: ^0.66.0
  
  # Sensors
  sensors_plus: ^4.0.2
  health: ^8.1.0
  
  # Utils
  intl: ^0.18.1
  http: ^1.1.0
  uuid: ^4.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/audio/
    - assets/animations/
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
